<!DOCTYPE html>

<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="meta-theme" content="#080d1a">
<title>全台路況天氣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<!-- 字型非阻塞載入 -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" media="print" onload="this.media='all'">
<style>
/* ══════════════════════════════════════
   1. DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --r1: 10px; --r2: 14px; --r3: 20px; --r4: 24px;
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --spring: cubic-bezier(0.34, 1.4, 0.64, 1);
}
[data-theme="light"] {
  --bg:#f0f2f5; --card:#fff; --inset:#eef0f3; --hover:#e4e7eb;
  --b1:rgba(0,0,0,0.09); --b2:rgba(0,0,0,0.05);
  --t1:#0f172a; --t2:#64748b; --t3:#94a3b8;
  --glass:rgba(255,255,255,0.88); --gb:rgba(0,0,0,0.06);
  --sh1:0 1px 3px rgba(0,0,0,0.06); --sh2:0 4px 16px rgba(0,0,0,0.09); --sh3:0 16px 48px rgba(0,0,0,0.14);
  --free:#16a34a; --free-s:#dcfce7;
  --slow:#d97706; --slow-s:#fef3c7;
  --bad:#dc2626;  --bad-s:#fee2e2;
  --acc:#0ea5e9;  --acc-s:#e0f2fe; --acc-g:rgba(14,165,233,0.28);
  --theme-meta:#f0f2f5;
}
[data-theme="dark"] {
  --bg:#080d1a; --card:#0e1828; --inset:#15202e; --hover:#1c2a3a;
  --b1:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.04);
  --t1:#f1f5f9; --t2:#8896aa; --t3:#3d4f63;
  --glass:rgba(10,18,34,0.9); --gb:rgba(255,255,255,0.07);
  --sh1:0 1px 3px rgba(0,0,0,0.35); --sh2:0 4px 16px rgba(0,0,0,0.45); --sh3:0 16px 48px rgba(0,0,0,0.65);
  --free:#22c55e; --free-s:rgba(34,197,94,0.12);
  --slow:#f59e0b; --slow-s:rgba(245,158,11,0.12);
  --bad:#ef4444;  --bad-s:rgba(239,68,68,0.12);
  --acc:#38bdf8;  --acc-s:rgba(56,189,248,0.12); --acc-g:rgba(56,189,248,0.3);
  --theme-meta:#080d1a;
}

/* ══════════════════════════════════════
2. RESET
══════════════════════════════════════ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:var(–font); background:var(–bg); color:var(–t1); overflow:hidden; -webkit-font-smoothing:antialiased; text-rendering:optimizeSpeed; }
button { font-family:var(–font); cursor:pointer; border:none; background:none; color:inherit; }
img { display:block; max-width:100%; }
/* 提升 GPU 合成效率 */
.will-change { will-change:transform; }

/* ══════════════════════════════════════
3. APP SHELL
══════════════════════════════════════ */
#app {
display:flex; flex-direction:column;
height:100dvh; max-width:430px; margin:0 auto;
background:var(–bg); position:relative; overflow:hidden;
/* 讓背景色切換有過渡 */
transition:background 0.3s var(–ease);
}

/* ══════════════════════════════════════
4. HEADER
══════════════════════════════════════ */
.hdr {
display:flex; justify-content:space-between; align-items:center;
padding:10px 16px; padding-top:calc(10px + var(–safe-t));
background:var(–glass); border-bottom:1px solid var(–gb);
backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
flex-shrink:0; z-index:100;
/* 使用 transform 避免 reflow */
transform:translateZ(0);
}
.hdr-brand { display:flex; align-items:center; gap:9px; }
.hdr-logo  { font-size:22px; line-height:1; }
.hdr-name  { font-size:16px; font-weight:900; letter-spacing:-.03em; }
.hdr-date  { font-size:10px; color:var(–t3); margin-top:1px; }
.hdr-right { display:flex; align-items:center; gap:6px; }
.live-clk  {
display:flex; align-items:center; gap:6px;
background:var(–inset); border:1px solid var(–b1);
border-radius:var(–r1); padding:5px 10px;
}
.live-dot  {
width:6px; height:6px; border-radius:50%; background:var(–free);
box-shadow:0 0 5px var(–free);
animation:blink 2.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.clk-dig   { font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:.04em; }
.ico-btn   {
width:34px; height:34px; border-radius:var(–r1);
background:var(–inset); border:1px solid var(–b1);
font-size:16px; display:flex; align-items:center; justify-content:center;
transition:transform .12s; flex-shrink:0;
}
.ico-btn:active { transform:scale(.88); }

/* ══════════════════════════════════════
5. NAV BAR
══════════════════════════════════════ */
.nav {
display:flex; background:var(–glass);
backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
border-top:1px solid var(–gb);
padding:4px 8px; padding-bottom:calc(4px + var(–safe-b));
flex-shrink:0; z-index:100; transform:translateZ(0);
}
.nav-it {
flex:1; display:flex; flex-direction:column; align-items:center;
gap:2px; padding:7px 4px; border-radius:var(–r2);
color:var(–t3); font-size:10px; font-weight:500;
transition:color .18s, background .18s;
position:relative;
}
.nav-it.active { color:var(–acc); background:var(–acc-s); }
/* 底部指示點 */
.nav-it.active::after {
content:’’; position:absolute; bottom:4px;
width:4px; height:4px; border-radius:50%; background:var(–acc);
}
.nav-ico { font-size:21px; line-height:1; }

/* ══════════════════════════════════════
6. PAGE SYSTEM
用 opacity+pointer-events 切換，避免 display toggle 造成 reflow
══════════════════════════════════════ */
.pg-wrap {
flex:1; min-height:0; position:relative; overflow:hidden;
}
.pg {
position:absolute; inset:0;
display:flex; flex-direction:column;
opacity:0; pointer-events:none;
transition:opacity .2s var(–ease);
/* GPU layer */
transform:translateZ(0);
will-change:opacity;
}
.pg.active { opacity:1; pointer-events:all; }

/* ══════════════════════════════════════
7. MAP PAGE
══════════════════════════════════════ */
#map { width:100%; height:100%; }
.map-ui { position:absolute; inset:0; pointer-events:none; z-index:500; }
.map-ui>* { pointer-events:all; }

/* 地圖頂部資訊卡 */
.map-card {
position:absolute; top:12px; left:12px; right:12px;
background:var(–glass); border:1px solid var(–gb);
backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
border-radius:var(–r3); padding:12px 14px;
box-shadow:var(–sh2);
display:flex; align-items:center; gap:12px;
/* 卡片進場動畫 */
animation:card-in .35s var(–spring) both;
}
@keyframes card-in { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.mc-ico   { font-size:30px; flex-shrink:0; line-height:1; }
.mc-body  { flex:1; min-width:0; }
.mc-city  { font-size:15px; font-weight:800; letter-spacing:-.02em; }
.mc-meta  { font-size:11px; color:var(–t2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-pills { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.mc-pill  { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; }

/* 圖例 */
.legend {
position:absolute; bottom:72px; left:12px;
background:var(–glass); border:1px solid var(–gb);
backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
border-radius:var(–r2); padding:8px 12px; box-shadow:var(–sh1);
}
.leg-ttl { font-size:9px; color:var(–t3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
.leg-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.leg-row:last-child { margin-bottom:0; }
.leg-pip { width:20px; height:4px; border-radius:2px; }
.leg-row span { font-size:11px; color:var(–t2); }

/* 定位 FAB */
.fab {
position:absolute; bottom:72px; right:12px;
width:48px; height:48px; border-radius:16px;
background:var(–acc); color:#fff; font-size:20px;
display:flex; align-items:center; justify-content:center;
box-shadow:0 4px 20px var(–acc-g);
transition:transform .12s, box-shadow .12s;
}
.fab:active  { transform:scale(.88); box-shadow:0 2px 8px var(–acc-g); }
.fab.loading { animation:pulse-spin 1s linear infinite; }
@keyframes pulse-spin { to { transform:rotate(360deg); } }

/* 使用者定位點 */
@keyframes gps-ring {
0%  { transform:scale(1);   opacity:.6; }
70% { transform:scale(3.2); opacity:0; }
100%{ transform:scale(1);   opacity:0; }
}
.u-wrap { width:36px; height:36px; display:flex; align-items:center; justify-content:center; position:relative; }
.u-ring { position:absolute; width:18px; height:18px; border-radius:50%; background:var(–acc); animation:gps-ring 2s ease-out infinite; }
.u-core { width:14px; height:14px; border-radius:50%; background:var(–acc); border:3px solid #fff; box-shadow:0 2px 8px var(–acc-g); position:relative; z-index:1; }

/* ══════════════════════════════════════
8. LIST PAGE
══════════════════════════════════════ */
.list-hdr { padding:10px 14px 0; flex-shrink:0; background:var(–bg); }

/* Search */
.srch-wrap { position:relative; }
.srch-in {
width:100%; padding:11px 38px 11px 40px;
background:var(–card); border:1.5px solid var(–b1);
border-radius:var(–r2); font-size:14px; font-family:var(–font);
color:var(–t1); outline:none; -webkit-appearance:none;
transition:border-color .18s;
}
.srch-in:focus { border-color:var(–acc); }
.srch-in::placeholder { color:var(–t3); }
.srch-ico { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; opacity:.5; }
.srch-clr {
position:absolute; right:10px; top:50%; transform:translateY(-50%);
width:22px; height:22px; border-radius:50%;
background:var(–t3); color:var(–bg);
font-size:11px; font-weight:900;
display:none; align-items:center; justify-content:center;
transition:opacity .15s;
}
.srch-clr.on { display:flex; }

/* Region tabs */
.rtabs { display:flex; gap:6px; overflow-x:auto; padding:8px 0 2px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.rtabs::-webkit-scrollbar { display:none; }
.rtab {
flex-shrink:0; padding:6px 14px; border:1.5px solid var(–b1);
border-radius:20px; background:var(–card); color:var(–t2);
font-size:12px; font-weight:500;
transition:all .18s; white-space:nowrap;
}
.rtab.active { background:var(–acc); border-color:var(–acc); color:#fff; font-weight:700; }

/* Stats bar */
.stats-bar { display:flex; gap:6px; padding:8px 14px 0; flex-shrink:0; }
.s-chip { flex:1; border-radius:var(–r1); padding:7px 4px; text-align:center; }
.s-num  { font-size:22px; font-weight:900; line-height:1; }
.s-lbl  { font-size:9px; color:var(–t2); margin-top:3px; letter-spacing:.04em; }

/* Virtual scroll */
.vscroll {
flex:1; overflow-y:auto; overflow-x:hidden;
-webkit-overflow-scrolling:touch;
padding:10px 14px; padding-bottom:calc(16px + var(–safe-b));
/* 優化捲動效能 */
contain:strict;
}
.vscroll::-webkit-scrollbar { width:3px; }
.vscroll::-webkit-scrollbar-thumb { background:var(–b1); border-radius:2px; }

/* ══════════════════════════════════════
9. CITY CARD
══════════════════════════════════════ */
.city-card {
background:var(–card); border:1px solid var(–b1);
border-radius:var(–r4); margin-bottom:12px; overflow:hidden;
box-shadow:var(–sh1);
/* 效能：限制 repaint 到卡片自身 */
contain:content;
animation:slide-up .28s var(–ease) both;
}
@keyframes slide-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.c-top { padding:14px 16px 0; display:flex; justify-content:space-between; align-items:flex-start; }
.c-name { font-size:20px; font-weight:900; letter-spacing:-.03em; }
.c-rgn  { font-size:10px; color:var(–t3); margin-top:2px; letter-spacing:.05em; }
.c-summary { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }
.cpill  { font-size:10px; font-weight:700; padding:2px 8px; border-radius:7px; }

/* Weather strip */
.wx { display:flex; align-items:center; gap:12px; padding:10px 16px 12px; border-bottom:1px solid var(–b2); }
.wx-ico { font-size:36px; line-height:1; flex-shrink:0; }
.wx-t   { font-size:32px; font-weight:900; letter-spacing:-.04em; line-height:1; }
.wx-u   { font-size:13px; color:var(–t2); }
.wx-d   { font-size:12px; color:var(–t2); margin-top:2px; }
.wx-m   { display:flex; gap:9px; margin-top:4px; flex-wrap:wrap; }
.wx-c   { font-size:11px; color:var(–t2); }

/* Roads */
.roads  { padding:10px 16px 12px; }
.sec-lbl { font-size:9px; font-weight:700; color:var(–t3); text-transform:uppercase; letter-spacing:.12em; margin-bottom:7px; }
.road-r {
display:flex; justify-content:space-between; align-items:center;
padding:8px 10px; background:var(–inset); border-radius:var(–r1);
border:1px solid var(–b2); margin-bottom:5px;
}
.road-r:last-child { margin-bottom:0; }
.road-n { font-size:13px; font-weight:600; }
.road-d { font-size:11px; color:var(–t2); margin-top:1px; }
.st-pill { font-size:10px; font-weight:700; padding:3px 9px; border-radius:7px; flex-shrink:0; margin-left:8px; }

/* CCTV reel */
.cctv-s { border-top:1px solid var(–b2); padding:10px 0 14px; }
.sp     { padding-left:16px; }
.reel   { display:flex; gap:8px; overflow-x:auto; padding:0 16px 4px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.reel::-webkit-scrollbar { display:none; }
.thumb  {
flex-shrink:0; width:150px; border-radius:var(–r2); overflow:hidden;
border:1px solid var(–b1); background:var(–inset); cursor:pointer;
/* touch feedback */
transition:transform .12s var(–ease);
}
.thumb:active { transform:scale(.94); }
.th-img { position:relative; height:84px; background:var(–hover); overflow:hidden; }
.th-img img { width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .3s; }
.th-img img.in { opacity:1; }
.src-pip {
position:absolute; top:5px; left:5px;
font-size:9px; font-weight:700;
padding:2px 6px; border-radius:5px; color:#fff; letter-spacing:.04em;
}
.th-lbl { padding:5px 8px 7px; font-size:11px; font-weight:600; line-height:1.3; }

/* ══════════════════════════════════════
10. SKELETON
══════════════════════════════════════ */
@keyframes shim { 0%{background-position:-300px 0} 100%{background-position:300px 0} }
.sk {
background:linear-gradient(90deg, var(–inset) 25%, var(–hover) 50%, var(–inset) 75%);
background-size:600px 100%; animation:shim 1.4s infinite; border-radius:var(–r1);
}
.sk-card { background:var(–card); border:1px solid var(–b1); border-radius:var(–r4); margin-bottom:12px; padding:16px; }
.sk-h12 { height:12px; margin-bottom:8px; }
.sk-h20 { height:20px; margin-bottom:8px; }
.sk-h84 { height:84px; margin-top:10px; border-radius:var(–r2); }
.sk-30  { width:30%; } .sk-50 { width:50%; } .sk-70 { width:70%; } .sk-90 { width:90%; }

/* ══════════════════════════════════════
11. MODAL
══════════════════════════════════════ */
.modal-bg {
position:fixed; inset:0; z-index:9000;
background:rgba(0,0,0,.78);
backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
display:flex; align-items:flex-end;
opacity:0; pointer-events:none;
transition:opacity .22s var(–ease);
}
.modal-bg.open { opacity:1; pointer-events:all; }
.modal-sh {
width:100%; max-width:430px; margin:0 auto;
background:var(–card); border-radius:var(–r4) var(–r4) 0 0;
border:1px solid var(–b1); border-bottom:none;
padding:16px 18px; padding-bottom:calc(20px + var(–safe-b));
box-shadow:var(–sh3);
transform:translateY(50px);
transition:transform .32s var(–spring);
}
.modal-bg.open .modal-sh { transform:translateY(0); }
.m-hnd  { width:36px; height:4px; background:var(–b1); border-radius:2px; margin:0 auto 14px; }
.m-top  { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.m-tag  { font-size:10px; color:var(–t3); text-transform:uppercase; letter-spacing:.1em; }
.m-ttl  { font-size:18px; font-weight:900; letter-spacing:-.02em; margin-top:3px; }
.m-src  { font-size:11px; font-weight:700; padding:4px 10px; border-radius:8px; color:#fff; flex-shrink:0; }
.m-med  {
border-radius:var(–r3); overflow:hidden; aspect-ratio:16/9;
background:var(–hover); position:relative; margin-bottom:12px;
}
.m-med img, .m-med iframe { width:100%; height:100%; object-fit:cover; border:none; display:block; }
.m-live { position:absolute; top:8px; left:8px; background:rgba(220,38,38,.9); color:#fff; font-size:9px; font-weight:700; padding:3px 8px; border-radius:5px; letter-spacing:.05em; }
.m-ts   { position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,.62); color:#fff; font-size:9px; padding:2px 8px; border-radius:5px; font-variant-numeric:tabular-nums; }
.m-meta { display:flex; gap:7px; margin-bottom:14px; }
.m-cell { flex:1; background:var(–inset); border:1px solid var(–b1); border-radius:var(–r1); padding:8px 10px; }
.m-cl   { font-size:9px; color:var(–t3); text-transform:uppercase; letter-spacing:.08em; }
.m-cv   { font-size:12px; font-weight:700; margin-top:3px; }
.btn-cl {
width:100%; background:var(–inset); border:1px solid var(–b1);
border-radius:var(–r2); color:var(–t1); padding:14px;
font-size:15px; font-weight:700;
transition:opacity .15s;
}
.btn-cl:active { opacity:.6; }

/* ══════════════════════════════════════
12. STATUS UTILITIES
══════════════════════════════════════ */
.c-free{color:var(–free)} .c-slow{color:var(–slow)} .c-bad{color:var(–bad)}
.bg-free{background:var(–free-s);color:var(–free)}
.bg-slow{background:var(–slow-s);color:var(–slow)}
.bg-bad {background:var(–bad-s); color:var(–bad)}

/* ══════════════════════════════════════
13. EMPTY STATE
══════════════════════════════════════ */
.empty { text-align:center; padding:48px 24px; color:var(–t3); animation:slide-up .3s var(–ease); }
.empty-e { font-size:44px; margin-bottom:10px; }
.empty-t { font-size:14px; line-height:1.7; }

/* ══════════════════════════════════════
14. LEAFLET OVERRIDES
══════════════════════════════════════ */
.leaflet-container { background:var(–bg) !important; }
.leaflet-popup-content-wrapper {
background:var(–card) !important; color:var(–t1) !important;
border:1px solid var(–b1) !important; border-radius:var(–r2) !important;
box-shadow:var(–sh3) !important;
}
.leaflet-popup-tip { background:var(–card) !important; }
.leaflet-popup-content { font-family:var(–font) !important; font-size:13px !important; }
.leaflet-control-zoom a { background:var(–card) !important; color:var(–t1) !important; border-color:var(–b1) !important; }
.leaflet-control-attribution { display:none !important; }

/* ══════════════════════════════════════
15. TOAST NOTIFICATION
══════════════════════════════════════ */
.toast {
position:fixed; bottom:calc(80px + var(–safe-b)); left:50%; transform:translateX(-50%) translateY(10px);
background:var(–t1); color:var(–bg); padding:10px 18px;
border-radius:20px; font-size:13px; font-weight:600;
box-shadow:var(–sh2); z-index:9999;
opacity:0; transition:opacity .22s var(–ease), transform .22s var(–ease);
pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
16. PULL-TO-REFRESH INDICATOR
══════════════════════════════════════ */
.ptr {
position:absolute; top:0; left:0; right:0; z-index:200;
display:flex; align-items:center; justify-content:center;
height:48px; color:var(–t2); font-size:13px; font-weight:600;
transform:translateY(-48px);

  const nameIdx = Object.fromEntries(RAW.map((c, i) => [c.name, i]));

  // init() 完成後才賦值的唯讀快照
  let cities = [];
  let idxMap  = {};

  // RAW → 凍結的 cities（每次 API 更新後重新呼叫）
  function freeze() {
    cities = Object.freeze(RAW.map(c => Object.freeze({
      ...c,
      _cnt: Object.freeze(c.roads.reduce((a, r) => { a[r.s]=(a[r.s]||0)+1; return a; }, {})),
      _ms:  (() => { const r=c.roads.reduce((a,x)=>{a[x.s]=(a[x.s]||0)+1;return a;},{}); return r.bad?'bad':r.slow?'slow':'free'; })(),
    })));
    idxMap = Object.freeze(Object.fromEntries(cities.map((c, i) => [c.id, i])));
  }

  // 解析單一 location 節點並覆寫對應 RAW[i].w
  function applyLocation(loc) {
    const name = normName(loc.locationName);
    const idx  = nameIdx[name];
    if(idx === undefined) return;

    const elMap = Object.fromEntries(
      loc.weatherElement.map(el => [el.elementName, el.time])
    );
    const getVal = (k) => elMap[k]?.[0]?.parameter?.parameterName ?? null;
    const getNum = (k) => { const v = parseInt(getVal(k)); return isNaN(v) ? null : v; };

    const wxDesc = getVal('Wx');
    const pop    = getNum('PoP');
    const minT   = getNum('MinT');
    const maxT   = getNum('MaxT');
    const temp   = maxT ?? (minT !== null ? minT : null);

    // 只覆寫 API 有提供的欄位，濕度與風速保留 Mock 值
    RAW[idx].w = {
      ...RAW[idx].w,
      i:    wxToIcon(wxDesc) ?? RAW[idx].w.i,
      t:    temp             ?? RAW[idx].w.t,
      d:    wxDesc           ?? RAW[idx].w.d,
      rain: pop              ?? RAW[idx].w.rain,
      _src: 'cwa',           // 標記資料來源，方便除錯
    };
  }

  return {
    all:    ()          => cities,
    byIdx:  (i)         => cities[i],
    idxOf:  (id)        => idxMap[id],
    filter: (region, search) => cities.filter(c =>
      (region === 'all' || c.r === region) &&
      (!search || c.name.includes(search))
    ),

    async init() {
      // ①  先用 Mock 凍結，讓地圖與地圖標記可立刻顯示
      freeze();

      // ②  Key 未填入則直接使用 Mock，不發出無效請求
      if(!CWA_KEY || CWA_KEY === 'YOUR_API_KEY') {
        console.warn('[Data] CWA_KEY 未設定，使用 Mock 天氣資料');
        return;
      }

      try {
        const url = 'https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001'
                  + `?Authorization=${CWA_KEY}`
                  + '&elementName=Wx,PoP,MinT,MaxT';   // 只取需要的欄位，減少傳輸量

        const res = await fetch(url, {
          signal: AbortSignal.timeout(10000),            // 10 秒逾時
        });

        if(!res.ok) throw new Error(`HTTP ${res.status}`);

        const json      = await res.json();
        const locations = json?.records?.location;

        if(!Array.isArray(locations) || !locations.length) {
          throw new Error('API 回傳格式異常');
        }

        // ③  逐一覆寫 RAW 天氣欄位
        locations.forEach(applyLocation);

        // ④  重新凍結並廣播更新事件
        freeze();
        Bus.emit('weather:updated');
        console.info(`[Data] 天氣更新完成，共處理 ${locations.length} 個縣市`);

      } catch(err) {
        // API 失敗不阻斷使用，保留 Mock 資料
        console.warn('[Data] CWA API 失敗，保留 Mock 資料：', err.message);
        Bus.emit('weather:error', err.message);
      }
    },

    // 手動重新整理（供下拉更新或定時呼叫）
    async refresh() { return this.init(); },
  };
})();

/* ══════════════════════════════════════════════════
   CLOCK：獨立時鐘模組，使用 requestAnimationFrame 節電
══════════════════════════════════════════════════ */
const Clock = (() => {
  const $c = $('js-clk'), $d = $('js-date');
  const tf = { hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false };
  const df = { year:'numeric',month:'long',day:'numeric',weekday:'short' };
  let last = '';

  function tick() {
    const n = new Date();
    const t = n.toLocaleTimeString('zh-TW', tf);
    if(t !== last) { $c.textContent = t; last = t; $d.textContent = n.toLocaleDateString('zh-TW', df); }
    requestAnimationFrame(tick);
  }
  return { init() { requestAnimationFrame(tick); } };
})();

/* ══════════════════════════════════════════════════
   TOAST：非阻塞通知
══════════════════════════════════════════════════ */
const Toast = (() => {
  const $t = $('toast');
  let tid;
  return {
    show(msg, dur=2200) {
      $t.textContent = msg;
      $t.classList.add('show');
      clearTimeout(tid);
      tid = setTimeout(() => $t.classList.remove('show'), dur);
    },
  };
})();

/* ══════════════════════════════════════════════════
   THEME：主題切換，通過 Bus 廣播
══════════════════════════════════════════════════ */
const Theme = (() => {
  let dark = true;
  const btn = $('js-theme');

  function apply(d) {
    dark = d;
    const theme = d ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
    $('meta-theme').content = d ? '#080d1a' : '#f0f2f5';
    btn.textContent = d ? '🌙' : '☀️';
    // 更新圖例顏色（直接操作 CSS 變數效率最高）
    const cols = d ? C.COLS.dark : C.COLS.light;
    $('lp-free').style.background = cols.free;
    $('lp-slow').style.background = cols.slow;
    $('lp-bad').style.background  = cols.bad;
    Bus.emit('theme', d);
  }

  btn.addEventListener('click', () => apply(!dark));
  return { init() { apply(true); }, isDark() { return dark; } };
})();

/* ══════════════════════════════════════════════════
   LAZY IMG：IntersectionObserver 懶加載
══════════════════════════════════════════════════ */
const Lazy = (() => {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(!e.isIntersecting) return;
      const img = e.target;
      img.src = img.dataset.src;
      img.onload = () => img.classList.add('in');
      io.unobserve(img);
    });
  }, { rootMargin:'120px' });

  return { watch(root) { root.querySelectorAll('img[data-src]').forEach(img => io.observe(img)); } };
})();

/* ══════════════════════════════════════════════════
   MAP MODULE
══════════════════════════════════════════════════ */
const MapMod = (() => {
  let map, tile;
  let mks = [], uMk, uCi;

  function mkColor(city) {
    return (Theme.isDark() ? C.COLS.dark : C.COLS.light)[city._ms];
  }

  function mkIcon(city) {
    const col = mkColor(city);
    return L.divIcon({
      className:'',
      html:`<div style="background:${col};color:#fff;border-radius:18px;padding:4px 10px;font-size:12px;font-weight:900;border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 10px rgba(0,0,0,.4);white-space:nowrap;cursor:pointer;font-family:var(--font)">${city.name}</div>`,
      iconAnchor:[36,16],
    });
  }

  function showCity(city) {
    const w = city.w, cnt = city._cnt;
    $('mc-ico').textContent  = w.i;
    $('mc-city').textContent = `${city.name}  ${w.t}°C`;
    $('mc-meta').textContent = `${w.d} ｜ 💧${w.h}% 🌧️${w.rain}%`;
    $('mc-pills').innerHTML  = Object.entries(C.ST).map(([k,s]) =>
      `<span class="mc-pill ${s.p}">${cnt[k]||0} ${s.lbl}</span>`
    ).join('');
    map.flyTo([city.lat,city.lng], C.MAP.cityZoom, { duration:C.MAP.flyDur, easeLinearity:.5 });
  }

  // 監聽主題變更
  Bus.on('theme', () => {
    if(!map) return;
    map.removeLayer(tile);
    tile = L.tileLayer(Theme.isDark() ? C.TILES.dark : C.TILES.light, { maxZoom:19 }).addTo(map);
    refreshMks();
  });

  function refreshMks() {
    mks.forEach(m => map.removeLayer(m));
    mks = [];
    Data.all().forEach(city => {
      const m = L.marker([city.lat,city.lng], { icon:mkIcon(city) })
        .addTo(map).on('click', () => showCity(city));
      mks.push(m);
    });
  }

  return {
    init() {
      map = L.map('map', { zoomControl:true, attributionControl:false }).setView(C.MAP.center, C.MAP.zoom);
      tile = L.tileLayer(C.TILES.dark, { maxZoom:19 }).addTo(map);
      refreshMks();
    },
    invalidate()  { setTimeout(() => map?.invalidateSize(), 80); },
    refreshMks,   // 公開給 Boot 在天氣更新後重繪標記
    locate() {
      if(!navigator.geolocation) { Toast.show('瀏覽器不支援定位'); return; }
      const btn = $('js-loc');
      btn.textContent='⏳'; btn.classList.add('loading');

      navigator.geolocation.getCurrentPosition(
        ({ coords:{ latitude:lat, longitude:lng, accuracy } }) => {
          btn.textContent='📍'; btn.classList.remove('loading');
          if(uMk) map.removeLayer(uMk);
          if(uCi) map.removeLayer(uCi);
          uCi = L.circle([lat,lng],{ radius:Math.min(accuracy,600), color:'#38bdf8', fillColor:'#38bdf8', fillOpacity:.1, weight:1.5, opacity:.4 }).addTo(map);
          uMk = L.marker([lat,lng],{
            icon:L.divIcon({ className:'', html:'<div class="u-wrap"><div class="u-ring"></div><div class="u-core"></div></div>', iconSize:[36,36], iconAnchor:[18,18] }),
            zIndexOffset:2000,
          }).addTo(map).bindPopup('<strong>📍 你在這裡</strong>');
          map.flyTo([lat,lng], 14, { duration:1.5 });

          // 找最近縣市
          const near = Data.all().reduce((b,c) => {
            const d = Math.hypot(c.lat-lat, c.lng-lng);
            return d < b.d ? {c,d} : b;
          }, { c:null, d:Infinity });
          if(near.c) { showCity(near.c); Toast.show(`📍 最近縣市：${near.c.name}`); }
        },
        err => {
          btn.textContent='📍'; btn.classList.remove('loading');
          Toast.show({ 1:'請允許位置存取', 2:'無法取得位置', 3:'定位逾時' }[err.code] || '定位失敗');
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
      );
    },
  };
})();

/* ══════════════════════════════════════════════════
   RENDERER：純函式模板，不含副作用
══════════════════════════════════════════════════ */
const R = (() => {
  const { ST:st, SRC:src } = C;

  const road = ({n,s,nt}) =>
    `<div class="road-r"><div><div class="road-n">${n}</div><div class="road-d">${nt}</div></div><span class="st-pill ${st[s].p}">${st[s].lbl}</span></div>`;

  const cam = (cv, ci, vi) =>
    `<div class="thumb" onclick="Modal.open(${ci},${vi})">
      <div class="th-img"><img data-src="${cv.img}" alt="${cv.n}" loading="lazy"><div class="src-pip" style="background:${src[cv.src].col}">${src[cv.src].lbl}</div></div>
      <div class="th-lbl">${cv.n}</div>
    </div>`;

  const card = (city, gi, delay) =>
    `<div class="city-card" style="animation-delay:${delay}s" role="listitem">
      <div class="c-top">
        <div>
          <div class="c-name">${city.name}</div>
          <div class="c-rgn">${city.rn}</div>
          <div class="c-summary">${Object.entries(st).map(([k,s])=>`<span class="cpill ${s.p}">${city._cnt[k]||0} ${s.lbl}</span>`).join('')}</div>
        </div>
      </div>
      <div class="wx">
        <div class="wx-ico">${city.w.i}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:4px"><div class="wx-t">${city.w.t}</div><div class="wx-u">°C</div></div>
          <div class="wx-d">${city.w.d}</div>
          <div class="wx-m"><span class="wx-c">💧${city.w.h}%</span><span class="wx-c">🌧️${city.w.rain}%</span><span class="wx-c">💨${city.w.wind}m/s</span></div>
        </div>
      </div>
      <div class="roads"><div class="sec-lbl">📍 主要道路</div>${city.roads.map(road).join('')}</div>
      <div class="cctv-s">
        <div class="sec-lbl sp">📷 CCTV 影像</div>
        <div class="reel">${city.cams.map((cv,j)=>cam(cv,gi,j)).join('')}</div>
      </div>
    </div>`;

  const skeleton = () =>
    `<div class="sk-card"><div class="sk sh-20 sk-30"></div><div class="sk sk-h12 sk-70" style="margin-top:6px"></div><div class="sk sk-h84 sk-90"></div></div>`;

  return { card, skeleton };
})();

/* ══════════════════════════════════════════════════
   LIST：列表頁邏輯
══════════════════════════════════════════════════ */
const List = (() => {
  let region='all', search='', timer=null;
  const $list=$('js-list-inner'), $stats=$('js-stats'), $clr=$('js-clr');
  const allCities = Data.all();

  function stats(cities) {
    const tot={ free:0,slow:0,bad:0 };
    cities.forEach(c => Object.keys(tot).forEach(k => tot[k] += c._cnt[k]||0));
    $stats.innerHTML = Object.entries(C.ST).map(([k,s]) =>
      `<div class="s-chip ${s.p}"><div class="s-num">${tot[k]}</div><div class="s-lbl">${C.STAT_LBL[k]}</div></div>`
    ).join('');
  }

  function cards(cities) {
    if(!cities.length) {
      $list.innerHTML = `<div class="empty"><div class="empty-e">🔍</div><div class="empty-t">找不到「${search}」<br>試試其他關鍵字</div></div>`;
      return;
    }
    // Skeleton 佔位
    $list.innerHTML = cities.map(() => R.skeleton()).join('');
    // 下一幀再塞真實卡片
    requestAnimationFrame(() => {
      $list.innerHTML = cities.map((c,i) => R.card(c, allCities.indexOf(c), i*.03)).join('');
      Lazy.watch($list);
      $('js-list').scrollTop = 0;
    });
  }

  function render() {
    const filtered = Data.filter(region, search);
    stats(filtered);
    cards(filtered);
  }

  // 事件委派：Tab
  $('js-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.rtab');
    if(!btn) return;
    document.querySelectorAll('.rtab').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected','false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    region = btn.dataset.r;
    render();
  });

  // 搜尋 debounce
  $('js-srch').addEventListener('input', e => {
    search = e.target.value.trim();
    $clr.classList.toggle('on', search.length > 0);
    clearTimeout(timer);
    timer = setTimeout(render, 160);
  });

  // 清除搜尋
  $clr.addEventListener('click', () => {
    $('js-srch').value = '';
    search = '';
    $clr.classList.remove('on');
    render();
  });

  return { init: render };
})();

/* ══════════════════════════════════════════════════
   MODAL：CCTV 影像，支援 touch swipe 下滑關閉
══════════════════════════════════════════════════ */
const Modal = (() => {
  const $bg=$('modal'), $sh=$bg.querySelector('.modal-sh');
  let startY=0, dy=0, open=false;

  // Touch swipe down → close
  $sh.addEventListener('touchstart', e => { startY=e.touches[0].clientY; dy=0; }, { passive:true });
  $sh.addEventListener('touchmove',  e => {
    dy = e.touches[0].clientY - startY;
    if(dy > 0) $sh.style.transform = `translateY(${dy}px)`;
  }, { passive:true });
  $sh.addEventListener('touchend', () => {
    if(dy > 80) { Modal.close(); }
    else { $sh.style.transform=''; }
    dy=0;
  });

  return {
    open(ci, vi) {
      const city=Data.byIdx(ci), cam=city.cams[vi];
      const s=C.ST[cam.s], src=C.SRC[cam.src], t=now();
      $('m-tag').textContent  = city.name;
      $('m-ttl').textContent  = cam.n;
      $('m-org').textContent  = src.lbl;
      $('m-st').textContent   = s.lbl;
      $('m-st').className     = `m-cv ${s.c}`;
      $('m-tm').textContent   = t;
      $('m-src').textContent  = src.lbl;
      $('m-src').style.background = src.col;
      // Mock 圖 | 真實：cam.streamUrl 或 cam.ytId
      $('m-med').innerHTML = `<img src="${cam.img}" alt="${cam.n}" style="opacity:1"><div class="m-live">● LIVE</div><div class="m-ts">${t}</div>`;
      $sh.style.transform='';
      $bg.classList.add('open');
      document.body.style.overflow='hidden';
      open=true;
    },
    close() {
      if(!open) return;
      $bg.classList.remove('open');
      document.body.style.overflow='';
      $sh.style.transform='';
      open=false;
    },
  };
})();

/* ══════════════════════════════════════════════════
   APP：頂層路由，事件委派導覽
══════════════════════════════════════════════════ */
const App = {
  cur: 'map',
  go(page, btn) {
    if(page === this.cur) return;
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-it').forEach(b => {
      b.classList.remove('active');
      b.removeAttribute('aria-current');
    });
    $(`pg-${page}`).classList.add('active');
    btn.classList.add('active');
    btn.setAttribute('aria-current','page');
    this.cur = page;
    if(page === 'map') MapMod.invalidate();
  },
};

/* ══════════════════════════════════════════════════
   KEYBOARD：ESC 關閉 Modal
══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => { if(e.key==='Escape') Modal.close(); });

/* ══════════════════════════════════════════════════
   BOOT：async 啟動，確保天氣資料就緒後再完整渲染
   流程：
     時鐘 / 主題 / 地圖  ──┐
                            ├─ 立刻顯示（不等 API）
     List（Mock 天氣）  ──┘
          ↓
     await Data.init()   ──→ CWA API 呼叫
          ↓
     weather:updated     ──→ 重繪 List + 地圖標記（真實溫度）
══════════════════════════════════════════════════ */
window.addEventListener('load', async () => {

  // 不依賴天氣資料的模組先初始化，讓畫面立刻可用
  Clock.init();
  Theme.init();
  MapMod.init();

  // 先用 Mock 資料渲染一次列表，讓使用者感受到即時回應
  List.init();

  // 等待 CWA API（成功 → 真實資料；失敗 → 靜默保留 Mock）
  await Data.init();

  // API 成功後重繪（若 Key 未設定或失敗，這兩個事件不會觸發）
  Bus.on('weather:updated', () => {
    List.init();            // 列表顯示真實溫度 / 天氣描述
    MapMod.refreshMks();    // 地圖標記同步更新
    Toast.show('🌤️ 天氣資料已更新');
  });

  Bus.on('weather:error', () => {
    Toast.show('⚠️ 天氣資料載入失敗，顯示估計值');
  });

  $('js-loc').addEventListener('click', () => MapMod.locate());

  // 預熱字型，避免 FOUT（字型閃爍）
  document.fonts.ready.then(() => document.body.style.visibility = 'visible');
});
</script>
