<!DOCTYPE html>

<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="meta-theme" content="#060d1f">
<title>環島路況指揮中心</title>

<!-- 地圖套件 -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.css">

<!-- 字型（非阻塞載入） -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
  media="print" onload="this.media='all'">

<!-- 專案樣式 -->

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->

  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">🏍️</div>
      <div>
        <div class="hdr-name">環島路況指揮中心</div>
        <div class="hdr-sub" id="js-date"></div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="live-clk">
        <div class="live-dot"></div>
        <div class="clk-dig" id="js-clk">--:--</div>
      </div>
      <button class="ico-btn" id="js-theme" aria-label="切換主題">🌙</button>
    </div>
  </header>

  <!-- ── Pages ── -->

  <main class="pg-wrap">

```
<!-- 地圖頁 -->
<section class="pg active" id="pg-map" aria-label="地圖">
  <div id="map" role="application" aria-label="台灣地圖"></div>
  <div class="map-ui" aria-hidden="true">

    <!-- 路線輸入列 -->
    <div class="route-bar">
      <div class="route-bar-title">📍 貼上 Google Maps 長網址，自動找出沿途攝影機</div>
      <div class="route-input-row">
        <input class="route-input" id="js-route-input" type="url"
          placeholder="https://www.google.com/maps/dir/..." autocomplete="off">
        <button class="route-btn" id="js-route-btn">分析路線</button>
      </div>
      <div class="route-status" id="js-route-status"></div>
    </div>

    <!-- 城市資訊卡 -->
    <div class="map-card" id="mc">
      <div class="mc-ico" id="mc-ico">🗺️</div>
      <div class="mc-body">
        <div class="mc-city" id="mc-city">全台灣</div>
        <div class="mc-meta" id="mc-meta">點縣市標記查看路況</div>
        <div class="mc-pills" id="mc-pills"></div>
      </div>
    </div>

    <!-- 路況圖例 -->
    <div class="legend">
      <div class="leg-ttl">路況</div>
      <div class="leg-row"><div class="leg-pip" id="lp-free"></div><span>順暢</span></div>
      <div class="leg-row"><div class="leg-pip" id="lp-slow"></div><span>緩慢</span></div>
      <div class="leg-row"><div class="leg-pip" id="lp-bad"></div><span>壅塞</span></div>
    </div>

    <!-- 定位 FAB -->
    <button class="fab" id="js-loc" aria-label="定位我的位置">📍</button>
  </div>
</section>

<!-- 縣市列表頁 -->
<section class="pg" id="pg-list" aria-label="縣市列表">
  <div class="list-hdr">
    <div class="srch-wrap" role="search">
      <span class="srch-ico" aria-hidden="true">🔍</span>
      <input class="srch-in" id="js-srch" type="search"
        placeholder="搜尋縣市…" autocomplete="off" aria-label="搜尋縣市">
      <button class="srch-clr" id="js-clr" aria-label="清除搜尋">✕</button>
    </div>
    <div class="rtabs" id="js-tabs" role="tablist" aria-label="地區篩選">
      <button class="rtab active" data-r="all"     role="tab" aria-selected="true">全部</button>
      <button class="rtab"        data-r="north"   role="tab" aria-selected="false">北部</button>
      <button class="rtab"        data-r="central" role="tab" aria-selected="false">中部</button>
      <button class="rtab"        data-r="south"   role="tab" aria-selected="false">南部</button>
      <button class="rtab"        data-r="east"    role="tab" aria-selected="false">東部</button>
      <button class="rtab"        data-r="island"  role="tab" aria-selected="false">離島</button>
    </div>
  </div>

  <!-- 沿途過濾提示橫條 -->
  <div class="route-banner" id="js-route-banner" role="status">
    <div class="rb-text" id="js-rb-text">🛣️ 顯示沿途縣市</div>
    <button class="rb-clear" id="js-rb-clear">清除路線</button>
  </div>

  <!-- 路況統計列 -->
  <div class="stats-bar" id="js-stats" aria-label="路況統計"></div>

  <!-- 縣市卡片捲動容器 -->
  <div class="vscroll" id="js-list" role="list" aria-label="縣市列表">
    <div id="js-list-inner"></div>
  </div>
</section>
```

  </main>

  <!-- ── 底部導覽列 ── -->

  <nav class="nav" aria-label="主導覽">
    <button class="nav-it active" data-page="map"  id="nav-map"  aria-label="地圖" aria-current="page">
      <div class="nav-ico" aria-hidden="true">🗺️</div>地圖
    </button>
    <button class="nav-it"        data-page="list" id="nav-list" aria-label="縣市列表">
      <div class="nav-ico" aria-hidden="true">📋</div>縣市列表
    </button>
  </nav>

</div><!-- end #app -->

<!-- ── CCTV Modal ── -->

<div class="modal-bg" id="modal" role="dialog" aria-modal="true" aria-label="CCTV影像">
  <div class="modal-sh">
    <div class="m-hnd" aria-hidden="true"></div>
    <div class="m-top">
      <div>
        <div class="m-tag"  id="m-tag"></div>
        <div class="m-ttl"  id="m-ttl"></div>
      </div>
      <div class="m-src" id="m-src"></div>
    </div>
    <div class="m-med" id="m-med"></div>
    <div class="m-meta">
      <div class="m-cell"><div class="m-cl">來源</div><div class="m-cv" id="m-org"></div></div>
      <div class="m-cell"><div class="m-cl">路況</div><div class="m-cv" id="m-st"></div></div>
      <div class="m-cell"><div class="m-cl">時間</div><div class="m-cv" id="m-tm"></div></div>
    </div>
    <button class="btn-cl" id="modal-close-btn">關閉影像</button>
  </div>
</div>

<!-- Toast 通知 -->

<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- ── 外部 JS 套件 ── -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>

<!-- ── 專案 JS（順序不可調換）── -->

<script src="js/config.js"></script>  <!-- 常數與 API Keys -->

<script src="js/utils.js"></script>   <!-- 工具函式與計算 -->

<script src="js/data.js"></script>    <!-- 縣市與 CCTV 資料 -->

<script src="js/main.js"></script>    <!-- 模組邏輯與啟動 -->

</body>
</html>
